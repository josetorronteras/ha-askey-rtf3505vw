name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' \
            custom_components/askey_rtf3505vw/manifest.json > tmp.json \
          && mv tmp.json custom_components/askey_rtf3505vw/manifest.json

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/askey_rtf3505vw/manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
